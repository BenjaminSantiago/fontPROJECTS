<html>
    <head>
        <style>
        @font-face
        {
            font-family: "REDIST";
            src: url("TEST__compREDISTRIBUTE__S__v04.otf") format("opentype");
        }


        body, html
        {
            transition: 0.5s;
            margin    : 0;
        }

        h1
        {
            font-family    : "REDIST";
            font-weight    : normal;
            font-size      : 80vmin;
            width          : 100vw;
            height         : 50vh;
            top            : 50vh;
            left           : 50vw;
            position       : absolute;
            animation      : rotater 3.0s ease-in-out infinite;
            transform      : translateX(-50%) translateY(-50%);
            padding        : 0;
            margin         : 0;
            text-align     : center;
            display        : flex;
            justify-content: center;
            align-items    : center;
        }

        @keyframes rotater
        {
            0%
            {
                font-variation-settings: "FRRO" 0, "FRWI" 400;
            }

            50%
            {
                font-variation-settings: "FRRO" 180, "FRWI" 400;
            }

            100%
            {
                font-variation-settings: "FRRO" 360, "FRWI" 400;
            }
        }
        </style>
    </head>

    <body>
        <h1></h1>
        <script>
        const text        = "YESSILLY";
        const the_heading = document.querySelector("h1");
        let   which_char  = 0;
        function rando_color()
        {
            const color = Math.floor(Math.random() * 255);
            return color;            
        }


        // Function to apply the random color to the body's background
        function set_bg_and_H1()
        {
            let red   = rando_color();
            let green = rando_color();
            let blue  = rando_color();

            document.body.style.backgroundColor = `rgb(${red}, ${green}, ${blue})`;
            the_heading.style.color = `rgb(${255 - red}, ${255 - green}, ${255 - blue})`;        
            the_heading.textContent = text[which_char];
            
            which_char = (which_char + 1) % text.length;
        }

        const interval = setInterval(set_bg_and_H1, 1500);
        set_bg_and_H1();
        </script>
    </body>
</html>
