<html>
    <head>
        <style>
            @font-face
            {
                font-family: 'REKTSTAKT';
                src        : url('REKT_STAKT__v06.ttf') format("truetype");
                font-style : normal;
                font-weight: normal;
            }

            *
            {
                font-family   : 'REKTSTAKT';
                letter-spacing: 0.2vw;
                line-height   : 0.8em;
            }

            body
            {
                background-color: #000000;
                color           : #FF00FF;
            }

            h1
            {
                width      : 100%;
                display    : block;
                margin     : 0 auto;
                white-space: normal;
            }


        </style>
    </head>

    <body>
        <h1>PROFESSOR BENJAMIN. BIZ</h1>

        <script>
            const el = document.querySelector("h1");
            const text = el.textContent;

            el.innerHTML = "";

            // put text in spans
            [...text].forEach((char,i)=> 
            {
                const span = document.createElement("span");
                span.textContent = char;
                span.style.display = "inline-block";

                el.appendChild(span);
            });

            const spans       = document.querySelectorAll("h1 span");
            const colors      = ["#FF00FF", "#00FFFF", "#FFFF00"]
            const wait_frames = 20;
            let   wait        = 0;
            let   color_shift       = 0;

            let prev_cycle = 0;

            function one_frame(time)
            {   
                const t = time * 0.005;
                const cycle = ((t * 2) % (2 * Math.PI));

                if(cycle < prev_cycle)
                {  
                    color_shift++;
                }

                prev_cycle = cycle;
                /* ------------------------------------- */
                spans.forEach((span, i) =>
                {

                    //console.log(`we're doin' something ${i}`);
                    const offset = i * -4;

                    const shift            = (2 * Math.PI) / 3;
                    const prev             = Math.sin(t + offset);
                    const col_1            = (Math.sin(t + offset) + 1)/2;
                    const col_2            = (Math.sin(t + offset + shift) + 1)/2;
                    const col_3            = (Math.sin(t + offset + (shift*2)) + 1)/2;
                          span.style.color = colors[(i + color_shift) % colors.length];
                    
                    span.style.fontVariationSettings = 
                    `"C1WI" ${150 + col_1 * 450},
                     "C2WI" ${150 + col_2 * 450}, 
                     "C3WI" ${150 + col_3 * 450}`;
                });
                /* ------------------------------------- */
                requestAnimationFrame(one_frame);
            }

            requestAnimationFrame(one_frame);

            const container = document.querySelector("h1");
const totalChars = spans.length;

function updateLayout() {
    const width = container.clientWidth;

    // pick a "target" character size
    const idealCharPx = 50; // tweak this

    // how many chars *could* fit?
    let charsPerLine = Math.floor(width / idealCharPx);

    // clamp
    charsPerLine = Math.max(1, Math.min(totalChars, charsPerLine));

    // now force them to perfectly fill
    const fontSize = width / 11;

    container.style.fontSize = fontSize + "px";
}

window.addEventListener("resize", updateLayout);
updateLayout();
        </script>
    </body>
</html>
